<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Medium suitcase">
  <!-- Handle bar (orange accent) -->
  <rect x="35" y="5" width="30" height="5" rx="2.5" fill="#FF6300"/>
  <!-- Telescoping handle -->
  <line x1="42" y1="10" x2="42" y2="21" stroke="#545454" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="10" x2="58" y2="21" stroke="#545454" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="12" y="21" width="76" height="72" rx="9" fill="white" stroke="#545454" stroke-width="2"/>
  <!-- Zipper inset -->
  <rect x="17" y="26" width="66" height="62" rx="7" fill="none" stroke="#EAEAEA" stroke-width="1.5"/>
  <!-- Band 1 -->
  <line x1="12" y1="47" x2="88" y2="47" stroke="#EAEAEA" stroke-width="1.5"/>
  <!-- Band 2 -->
  <line x1="12" y1="71" x2="88" y2="71" stroke="#EAEAEA" stroke-width="1.5"/>
  <!-- TSA lock -->
  <rect x="44" y="55" width="12" height="9" rx="2" fill="none" stroke="#545454" stroke-width="1.5"/>
  <path d="M46.5 55 Q46.5 51 50 51 Q53.5 51 53.5 55" stroke="#545454" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Spinner wheels -->
  <circle cx="20" cy="88" r="4.5" fill="#EAEAEA" stroke="#545454" stroke-width="1.5"/>
  <circle cx="80" cy="88" r="4.5" fill="#EAEAEA" stroke="#545454" stroke-width="1.5"/>
  <circle cx="20" cy="88" r="2" fill="#545454"/>
  <circle cx="80" cy="88" r="2" fill="#545454"/>
</svg>

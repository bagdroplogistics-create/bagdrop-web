<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Wedding luggage">
  <!-- Garment bag shape — tall, elegant, narrow -->
  <!-- Hanger hook (orange) -->
  <path d="M50 8 Q50 4 54 4 Q58 4 58 8 Q58 12 50 16 L44 20" stroke="#FF6300" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Shoulder curve -->
  <path d="M44 20 Q28 20 22 30" stroke="#545454" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 16 Q66 16 76 28" stroke="#545454" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (garment bag silhouette) -->
  <path d="M22 30 L22 86 Q22 93 29 93 L71 93 Q78 93 78 86 L78 30 Q72 22 50 22 Q28 22 22 30Z" fill="white" stroke="#545454" stroke-width="2"/>
  <!-- Center zip line -->
  <line x1="50" y1="22" x2="50" y2="90" stroke="#EAEAEA" stroke-width="1.5"/>
  <!-- Zip pull -->
  <circle cx="50" cy="56" r="3.5" fill="#FF6300"/>
  <!-- Bow (left petal) -->
  <path d="M34 36 Q38 33 42 37 Q38 41 34 38 Q30 36 34 36Z" fill="#FF6300" opacity="0.9"/>
  <!-- Bow (right petal) -->
  <path d="M66 36 Q62 33 58 37 Q62 41 66 38 Q70 36 66 36Z" fill="#FF6300" opacity="0.9"/>
  <!-- Bow center knot -->
  <circle cx="50" cy="37" r="3.5" fill="#FF6300"/>
  <!-- Subtle horizontal seam -->
  <line x1="22" y1="70" x2="78" y2="70" stroke="#EAEAEA" stroke-width="1"/>
</svg>
